<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CCEA HRMS Login</title>

    <link rel="stylesheet" href="../css/login-page.css">

</head>

<body>

    <div class="overlay">

        <!-- Login Card -->

        <div class="login-card">

    <!-- Header -->

    <div class="header">

        <img src="../assets/logo.png"
        class="logo"
        alt="School Logo">

        <div class="school-details">

            <h1>Christ Convent English Academy</h1>

            <p>CCEA ERP Portal</p>

        </div>

    </div>


    <hr>


    <!-- Login Heading -->

    <h2 class="login-heading">

        LOGIN

    </h2>


    <!-- Username -->

    <div class="input-box">

        <label>Email Address</label>

        <input
            id="email"
            type="email"
            placeholder="Enter your email address">


    </div>


    <!-- Password -->

    <div class="input-box">

        <label>Password</label>

        <input
            id="password"
            type="password"
            placeholder="Enter your password">

    </div>


    <!-- Forgot Password -->

    <div class="forgot-password">

        <a href="#">Forgot Password?</a>

    </div>


    <!-- Login Button -->

    <button
        id="login-btn"
        class="login-btn">
        LOGIN
    </button>

</div>

    </div>


    <script type="module" src="../js/login-page.js"></script>

</body>

</html>
